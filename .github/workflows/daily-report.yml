name: Daily sensor report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      backfill_hours:
        description: 'One-time backfill: hours of history to pull from the gateway, ignoring the usual high-water mark'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and append new sensor readings
        env:
          MONNIT_API_KEY_ID: ${{ secrets.MONNIT_API_KEY_ID }}
          MONNIT_API_SECRET_KEY: ${{ secrets.MONNIT_API_SECRET_KEY }}
          BACKFILL_HOURS: ${{ github.event.inputs.backfill_hours }}
        run: python scripts/fetch_and_append.py

      - name: Generate daily report
        run: python scripts/generate_report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.jsonl reports/
          git diff --cached --quiet || git commit -m "Daily sensor report $(date -u +%Y-%m-%d)"
          git push
