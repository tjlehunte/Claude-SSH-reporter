name: Daily GivenEnergy report

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'One-time backfill: days of history to pull, ignoring the usual high-water mark'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: reporter-writes
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and append new energy-flow readings
        env:
          GIVENERGY_BEARER_TOKEN: ${{ secrets.GIVENERGY_BEARER }}
          GIVENERGY_BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
        run: python GivenEnergy/scripts/fetch_and_append.py

      - name: Generate daily report
        run: python GivenEnergy/scripts/generate_report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GivenEnergy/data/history.jsonl GivenEnergy/reports/
          git diff --cached --quiet || git commit -m "Daily GivenEnergy report $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
