name: Publish reports to Pages

# Deliberately NOT triggered by `on: push` - the 4 report workflows push using
# the default GITHUB_TOKEN, and GitHub suppresses push-triggered workflow runs
# for pushes made with that token (loop prevention), so a push trigger here
# would silently never fire. workflow_run is exempt from that suppression.
on:
  workflow_run:
    workflows:
      - "Daily sensor report"
      - "Weekly sensor report"
      - "Daily GivenEnergy report"
      - "Weekly GivenEnergy report"
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Copies only the 4 latest.html files - deliberately excludes data/,
      # scripts/, and dated historical snapshots, since Pages here should
      # only ever expose the finished reports, not the raw underlying data.
      - name: Build curated site
        run: |
          mkdir -p _site/monnit/weekly _site/givenergy/weekly
          cp Monnit/reports/latest.html _site/monnit/index.html
          cp Monnit/reports/weekly/latest.html _site/monnit/weekly/index.html
          cp GivenEnergy/reports/latest.html _site/givenergy/index.html
          cp GivenEnergy/reports/weekly/latest.html _site/givenergy/weekly/index.html

          # Inject a back-to-index link at the top of each report. Done here at
          # publish time, not in the report generators, so the reports stay
          # self-contained everywhere else (repo files, dated snapshots) - the
          # link only exists on the Pages site, where the index it points to
          # actually exists. Daily reports sit one level deep, weeklies two.
          # \& because & is special in a sed replacement (expands to the match)
          BACK='<p style="margin-bottom:0"><a href="HREF" style="color:#4a7ab5;text-decoration:none;font-size:0.9rem">\&larr; All reports</a></p>'
          for f in _site/monnit/index.html _site/givenergy/index.html; do
            sed -i "s|<body>|<body>\n${BACK/HREF/../}|" "$f"
          done
          for f in _site/monnit/weekly/index.html _site/givenergy/weekly/index.html; do
            sed -i "s|<body>|<body>\n${BACK/HREF/../../}|" "$f"
          done
          # Fail loudly if the injection didn't land (e.g. the generators'
          # <body> tag changes shape) rather than silently publishing without it.
          for f in _site/monnit/index.html _site/monnit/weekly/index.html _site/givenergy/index.html _site/givenergy/weekly/index.html; do
            grep -q "All reports" "$f" || { echo "back-link injection failed for $f"; exit 1; }
          done
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>Reports</title>
          <style>
          body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; }
          a { display: block; margin: 0.9rem 0; font-size: 1.15rem; }
          </style></head>
          <body>
          <h1>Reports</h1>
          <a href="monnit/">Monnit &mdash; daily sensor report</a>
          <a href="monnit/weekly/">Monnit &mdash; weekly sensor report</a>
          <a href="givenergy/">GivenEnergy &mdash; daily energy report</a>
          <a href="givenergy/weekly/">GivenEnergy &mdash; weekly energy report</a>
          </body></html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
