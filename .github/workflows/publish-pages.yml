name: Publish reports to Pages

# Two triggers cover two different pushers, deliberately:
# - workflow_run for the 4 report workflows: they push using the default
#   GITHUB_TOKEN, and GitHub suppresses push-triggered workflow runs for
#   pushes made with that token (loop prevention), so a plain push trigger
#   would silently never fire for them. workflow_run is exempt from that
#   suppression.
# - push (path-filtered to the 4 latest.html files) for the weekly AI-insights
#   scheduled tasks: those are local routines, not GitHub Actions, and push
#   with a personal access token rather than GITHUB_TOKEN - so the loop
#   suppression above doesn't apply to them, and a push trigger fires normally.
#   Without this, the AI-insights narrative would land in the repo but never
#   reach Pages until someone manually re-ran this workflow.
on:
  workflow_run:
    workflows:
      - "Daily sensor report"
      - "Weekly sensor report"
      - "Daily GivenEnergy report"
      - "Weekly GivenEnergy report"
    types: [completed]
  push:
    branches: [main]
    paths:
      - 'Monnit/reports/latest.html'
      - 'Monnit/reports/weekly/latest.html'
      - 'GivenEnergy/reports/latest.html'
      - 'GivenEnergy/reports/weekly/latest.html'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Copies only the 4 latest.html files - deliberately excludes data/,
      # scripts/, and dated historical snapshots, since Pages here should
      # only ever expose the finished reports, not the raw underlying data.
      - name: Build curated site
        run: |
          mkdir -p _site/monnit/weekly _site/givenergy/weekly
          cp Monnit/reports/latest.html _site/monnit/index.html
          cp Monnit/reports/weekly/latest.html _site/monnit/weekly/index.html
          cp GivenEnergy/reports/latest.html _site/givenergy/index.html
          cp GivenEnergy/reports/weekly/latest.html _site/givenergy/weekly/index.html

          mkdir -p _site/assets
          cp assets/ehl-logo-light.png assets/sml-logo-light.png assets/UOS-logo-light.png _site/assets/

          # Inject a header (partner logos + back-to-index link, sticky) plus
          # a data-source line (not sticky, scrolls away with the report) at
          # the top of each report. Done here at publish time, not in the
          # report generators, so the reports stay self-contained everywhere
          # else (repo files, dated snapshots) - the header only exists on the
          # Pages site. Logos share one fixed height so they read as the same
          # size despite different aspect ratios, and sit on an explicit white
          # strip so force-dark mobile browsers can't invert them illegible.
          # DEPTH is the relative prefix back to the site root: daily reports
          # sit one level deep, weeklies two.
          # \& because & is special in a sed replacement (expands to the match)
          # position:sticky pins just the back-link+logos row to the top of
          # the viewport as the report scrolls beneath it (like a frozen
          # pane) - z-index keeps it above the charts, the border gives the
          # pinned row a visible edge against whatever scrolls under it. The
          # data-source line stays outside the sticky div, with its top
          # margin matched to the h1 title's default top margin (0.67em of
          # 2em = 1.34rem) so it sits with equal spacing above and below.
          HEADER='<div style="background:#fff;padding-top:0.6rem;padding-bottom:0.6rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5"><div style="display:flex;justify-content:space-between;align-items:center;gap:1.6rem;flex-wrap:wrap"><a href="DEPTH" style="color:#4a7ab5;text-decoration:none;font-size:1.15rem">\&larr; All reports</a><div style="display:flex;align-items:center;gap:1.6rem;flex-wrap:wrap"><img src="DEPTHassets/ehl-logo-light.png" alt="Energy House Labs" style="height:48px;width:auto"><img src="DEPTHassets/sml-logo-light.png" alt="Smart Meters, Smart Homes Lab" style="height:48px;width:auto"><img src="DEPTHassets/UOS-logo-light.png" alt="University of Salford" style="height:48px;width:auto"></div></div></div><p style="margin:1.34rem 0 0;color:#666">These reports are based on data collected from the Salford Smart Home</p>'
          for f in _site/monnit/index.html _site/givenergy/index.html; do
            sed -i "s|<body>|<body>\n${HEADER//DEPTH/../}|" "$f"
          done
          for f in _site/monnit/weekly/index.html _site/givenergy/weekly/index.html; do
            sed -i "s|<body>|<body>\n${HEADER//DEPTH/../../}|" "$f"
          done
          # Fail loudly if the injection didn't land (e.g. the generators'
          # <body> tag changes shape) rather than silently publishing without it.
          for f in _site/monnit/index.html _site/monnit/weekly/index.html _site/givenergy/index.html _site/givenergy/weekly/index.html; do
            grep -q "All reports" "$f" || { echo "header injection failed for $f"; exit 1; }
            grep -q "ehl-logo-light" "$f" || { echo "logo injection failed for $f"; exit 1; }
          done

          # Favicon: a small house glyph in the same blue used for "room"
          # bars/legend entries throughout the reports, so the browser tab
          # matches the report's own colour language. Inline SVG data URI -
          # single quotes inside it are percent-encoded as %27 (can't use a
          # literal ' inside this bash single-quoted string, and can't use "
          # since that would close the href="..." attribute early); # is
          # percent-encoded as %23 so the browser doesn't treat it as a URL
          # fragment and truncate the SVG there.
          FAVICON='<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%234a7ab5%27/%3E%3Cpath d=%27M16 6 6 15h3v11h6v-7h2v7h6V15h3z%27 fill=%27%23fff%27/%3E%3C/svg%3E">'
          for f in _site/monnit/index.html _site/monnit/weekly/index.html _site/givenergy/index.html _site/givenergy/weekly/index.html; do
            sed -i "s|<meta charset=\"utf-8\">|<meta charset=\"utf-8\">${FAVICON}|" "$f"
            grep -q "rel=\"icon\"" "$f" || { echo "favicon injection failed for $f"; exit 1; }
          done
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html><head><meta charset="utf-8">
          <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234a7ab5'/><path d='M16 6 6 15h3v11h6v-7h2v7h6V15h3z' fill='%23fff'/></svg>">
          <title>Salford Smart Home reports</title>
          <style>
          body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; background: #fff; }
          a { display: block; margin: 0.9rem 0; font-size: 1.15rem; }
          .logos { display: flex; align-items: center; gap: 1.6rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
          .logos img { height: 48px; width: auto; }
          .source { color: #666; }
          </style></head>
          <body>
          <div class="logos">
          <img src="assets/ehl-logo-light.png" alt="Energy House Labs">
          <img src="assets/sml-logo-light.png" alt="Smart Meters, Smart Homes Lab">
          <img src="assets/UOS-logo-light.png" alt="University of Salford">
          </div>
          <h1>Reports</h1>
          <p class="source">These reports are based on data collected from the Salford Smart Home.</p>
          <a href="monnit/">&#127777;&#65039; Monnit &mdash; daily sensor report</a>
          <a href="monnit/weekly/">&#127777;&#65039; Monnit &mdash; weekly sensor report</a>
          <a href="givenergy/">&#9889;&#65039; GivenEnergy &mdash; daily energy report</a>
          <a href="givenergy/weekly/">&#9889;&#65039; GivenEnergy &mdash; weekly energy report</a>
          </body></html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
